name: Volter Daily Log

on:
  schedule:
    # UTC 15:10 = JST 00:10 (毎日)
    - cron: '10 15 * * *'
  workflow_dispatch: {}  # 手動実行(テスト用)

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run fetch script
        env:
          VOLTER_USER: ${{ secrets.VOLTER_USER }}
          VOLTER_PASS: ${{ secrets.VOLTER_PASS }}
        run: python scripts/fetch_volter.py

      # ▼ エラー時のスクリーンショット ▼
      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore

      # ▼ CSV/JSON をダウンロード可能にする ▼
      - name: Upload raw export
        uses: actions/upload-artifact@v4
        with:
          name: volter-export
          path: data/raw/*.json

      - name: Upload daily log CSV
        uses: actions/upload-artifact@v4
        with:
          name: daily-log
          path: data/daily_log.csv

      # ▼ 成功時にコミット ▼
      - name: Commit and push data
        if: success()
        run: |
          git config user.name "volter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Add daily log $(date -u +'%Y-%m-%d')"
          git push
