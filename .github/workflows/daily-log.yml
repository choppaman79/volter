name: Volter Daily Log
on:
  schedule:
    # UTC 15:10 = JST 00:10 (毎日)
    - cron: '10 15 * * *'
  workflow_dispatch: {}  # 手動実行(テスト用)
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Run fetch script
        env:
          VOLTER_USER: ${{ secrets.VOLTER_USER }}
          VOLTER_PASS: ${{ secrets.VOLTER_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scripts/fetch_volter.py
              - name: Create daily JSON log with generated_today
        run: |
          today=$(date +%Y-%m-%d)
          yesterday=$(date -d "yesterday" +%Y-%m-%d)

          LOG_DIR="daily-log"

          # 今日の積算発電電力量（fetch_volter.py が出力した JSON から取得）
          latest_file=$(ls data/raw/*.json | sort | tail -n 1)
          total_today=$(jq -r '.total_generation_kwh' "$latest_file")

          # 昨日のログファイル
          yesterday_file="${LOG_DIR}/${yesterday}.json"

          # 昨日の積算発電電力量を抽出（キー名不明でも動く）
          if [ -f "$yesterday_file" ]; then
            total_yesterday=$(jq -r '
              to_entries
              | map(select(.value | numbers))
              | map(.value)
              | max
            ' "$yesterday_file")
          else
            total_yesterday=0
          fi

          # 当日積算発電量を計算
          generated_today=$(echo "$total_today - $total_yesterday" | bc)

          # 今日のログ JSON を作成
          mkdir -p "$LOG_DIR"
          jq -n \
            --arg date "$today" \
            --arg total "$total_today" \
            --arg generated "$generated_today" \
            '{
              date: $date,
              total_generation_kwh: ($total | tonumber),
              generated_today_kwh: ($generated | tonumber)
            }' > "${LOG_DIR}/${today}.json"

      # ▼ エラー時のスクリーンショット ▼
      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore
      # ▼ CSV/JSON をダウンロード可能にする ▼
      - name: Upload raw export
        uses: actions/upload-artifact@v4
        with:
          name: volter-export
          path: data/raw/*.json
      - name: Upload daily log CSV
        uses: actions/upload-artifact@v4
        with:
          name: daily-log
          path: data/daily_log.csv
      - name: Upload cleaning events CSV
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-events
          path: data/cleaning_events.csv
          if-no-files-found: ignore
      # ▼ 成功時にコミット ▼
      - name: Commit and push data
        if: success()
        run: |
          git config user.name "volter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Add daily log $(date -u +'%Y-%m-%d')"
          git push
